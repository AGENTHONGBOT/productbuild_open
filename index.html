<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>아기 작명소</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-topbar">
        <p class="eyebrow">Name Atelier</p>
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          aria-pressed="false"
          aria-label="다크 모드로 전환"
        >
          <span class="theme-toggle-icon" aria-hidden="true">☀</span>
        </button>
      </div>
      <h1>아이의 첫 인상을 담는 이름을 추천합니다</h1>
      <p class="hero-copy">
        태어난 날짜와 시간, 성별, 종교, 원하는 분위기를 선택하면
        감성과 의미를 함께 담은 이름 후보를 제안합니다.
      </p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <div class="panel-head">
          <p class="section-kicker">입력 정보</p>
          <h2>작명 조건 선택</h2>
        </div>

        <form id="naming-form" class="naming-form">
          <label>
            아이 성씨
            <input id="lastName" name="lastName" type="text" placeholder="예: 김" maxlength="10" />
          </label>

          <div class="field-grid birth-grid">
            <label>
              출생 날짜
              <input id="birthDate" name="birthDate" type="date" required />
            </label>

            <label>
              출생 시간
              <input id="birthTime" name="birthTime" type="time" required />
            </label>
          </div>

          <div class="field-grid">
            <label>
              성별
              <select id="gender" name="gender">
                <option value="girl">여아</option>
                <option value="boy">남아</option>
                <option value="neutral">성별 중립</option>
              </select>
            </label>

            <label>
              종교/배경
              <select id="religion" name="religion">
                <option value="none">특별히 없음</option>
                <option value="christian">기독교</option>
                <option value="buddhist">불교</option>
                <option value="catholic">천주교</option>
                <option value="traditional">전통/한자 중심</option>
              </select>
            </label>
          </div>

          <div class="field-grid">
            <label>
              원하는 분위기
              <select id="tone" name="tone">
                <option value="bright">밝고 사랑스러운 느낌</option>
                <option value="elegant">단정하고 우아한 느낌</option>
                <option value="modern">세련되고 현대적인 느낌</option>
                <option value="strong">단단하고 힘 있는 느낌</option>
              </select>
            </label>

            <label>
              이름 길이
              <select id="syllables" name="syllables">
                <option value="2">두 글자</option>
                <option value="3">세 글자</option>
              </select>
            </label>
          </div>

          <label>
            바라는 의미
            <textarea id="wish" name="wish" rows="4" placeholder="예: 지혜롭고 따뜻하며 주변에 좋은 영향력을 주는 아이"></textarea>
          </label>

          <button type="submit" class="primary-button">이름 추천받기</button>
        </form>
      </section>

      <section class="panel result-panel">
        <div class="panel-head">
          <p class="section-kicker">추천 결과</p>
          <h2>당신의 아이를 위한 이름</h2>
        </div>

        <div id="summary" class="summary-card"></div>
        <div id="analysis" class="analysis-card"></div>
        <div id="recommendations" class="recommendation-list"></div>
        <section id="hanjaPanel" class="hanja-panel"></section>
      </section>
    </main>

    <section class="panel contact-panel">
      <div class="panel-head">
        <p class="section-kicker">Partnership</p>
        <h2>제휴 문의</h2>
      </div>
      <p class="contact-copy">
        브랜드 제휴, 콘텐츠 협업, B2B 도입 문의를 남겨주시면 확인 후 회신드립니다.
      </p>

      <form
        class="contact-form"
        action="https://formspree.io/f/meelbvlw"
        method="POST"
        accept-charset="UTF-8"
      >
        <input type="hidden" name="_subject" value="아기 작명소 제휴 문의" />

        <div class="field-grid">
          <label>
            회사명
            <input name="company" type="text" placeholder="예: ABC Studio" required />
          </label>

          <label>
            담당자명
            <input name="name" type="text" placeholder="예: 홍길동" required />
          </label>
        </div>

        <div class="field-grid">
          <label>
            이메일
            <input name="email" type="email" placeholder="contact@example.com" required />
          </label>

          <label>
            문의 유형
            <select name="inquiryType" required>
              <option value="brand-partnership">브랜드 제휴</option>
              <option value="content-collaboration">콘텐츠 협업</option>
              <option value="b2b-introduction">B2B 도입</option>
              <option value="other">기타</option>
            </select>
          </label>
        </div>

        <label>
          문의 내용
          <textarea
            name="message"
            rows="5"
            placeholder="협업 목적, 기대 효과, 일정, 연락 가능한 방법을 남겨주세요."
            required
          ></textarea>
        </label>

        <button type="submit" class="primary-button">제휴 문의 보내기</button>
      </form>
    </section>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
